<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title"></title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script> 
    <style id="dynamic-styles"></style> 
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: transform 0.2s; }
        .product-card:active { transform: scale(0.95); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        #detail-modal { max-width: 600px; margin: 0 auto; left: 0; right: 0; }
    </style>
</head>
<body class="bg-black text-gray-100 font-sans pb-24">

    <header class="p-4 flex justify-between items-center bg-zinc-900 sticky top-0 z-50 shadow-2xl border-b border-primary">
        <h1 id="header-name" class="text-2xl font-black tracking-tighter italic"></h1>
        <div class="flex gap-2">
            <a href="javascript:void(0)" onclick="window.open(CONFIG.locationUrl)" class="bg-zinc-800 p-3 rounded-xl border border-zinc-700">
                <i class="fas fa-map-marker-alt text-xl text-primary"></i>
            </a>
            <button onclick="toggleCart()" class="relative bg-zinc-800 p-3 rounded-xl border border-zinc-700">
                <i class="fas fa-shopping-cart text-xl text-white"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full hidden">0</span>
            </button>
        </div>
    </header>

    <nav id="filters" class="p-4 flex gap-2 overflow-x-auto no-scrollbar bg-black sticky top-[72px] z-40"></nav>

    <main id="catalog" class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4 pb-20"></main>

    <div id="detail-modal" class="fixed inset-0 bg-zinc-950 z-[70] hidden flex flex-col p-6 animate-fade-in no-scrollbar">
        <button onclick="closeDetail()" class="absolute top-4 right-6 text-white text-5xl z-30 bg-black/50 w-12 h-12 rounded-full">×</button>
        
        <div id="detail-scroll-area" class="flex-1 overflow-y-auto no-scrollbar pb-32">
            <img id="detail-img" src="" class="w-full aspect-square object-cover rounded-3xl mb-6 shadow-2xl">
            <div class="flex justify-between items-center mb-2">
                <span id="detail-cat" class="text-primary font-bold uppercase tracking-widest text-[10px]"></span>
                <span id="detail-price" class="text-3xl font-black text-white"></span>
            </div>
            <h2 id="detail-name" class="text-2xl font-black text-white mb-2 leading-tight"></h2>
            <p id="detail-desc" class="text-zinc-400 text-sm leading-relaxed mb-6"></p>

            <div class="mb-4">
                <label class="block text-white font-bold text-xs uppercase mb-2 tracking-wider">Cantidad</label>
                <div class="flex items-center gap-3 bg-zinc-800 p-3 rounded-xl border border-zinc-700 max-w-[150px]">
                    <button onclick="changeDetailQty(-1)" class="text-white text-xl w-10 h-10 flex items-center justify-center bg-zinc-700 rounded-lg">-</button>
                    <input type="number" id="detail-qty" value="1" min="1" readonly class="w-full text-center bg-transparent text-white font-black text-xl outline-none">
                    <button onclick="changeDetailQty(1)" class="text-white text-xl w-10 h-10 flex items-center justify-center bg-zinc-700 rounded-lg">+</button>
                </div>
            </div>

            <div class="mb-6">
                <label for="item-comment" class="block text-white font-bold text-xs uppercase mb-2 tracking-wider">Talla, Color o Notas</label>
                <textarea id="item-comment" placeholder="Ej: Talla M, Color Rojo..." class="w-full bg-zinc-800 text-white p-4 rounded-xl border border-zinc-700 text-sm focus:border-primary outline-none" rows="3"></textarea>
            </div>
        </div>

        <div class="fixed bottom-6 left-6 right-6 flex justify-between items-center bg-zinc-900 p-6 rounded-3xl border border-zinc-800 shadow-2xl z-20 max-w-[552px] mx-auto">
            <span id="detail-footer-price" class="text-3xl font-black text-white">$0</span>
            <button id="add-to-cart-btn" class="bg-primary text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2 active:scale-95 transition-transform uppercase text-xs tracking-widest">
                Agregar al pedido
            </button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex flex-col p-6 backdrop-blur-md overflow-y-auto no-scrollbar">
        <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
            <h2 class="text-3xl font-extrabold text-white italic">TU PEDIDO</h2>
            <button onclick="toggleCart()" class="text-zinc-500 text-5xl">×</button>
        </div>
        
        <div id="cart-items" class="space-y-4 mb-8"></div>

        <div class="space-y-6 mb-10 border-t border-zinc-800 pt-8">
            <h3 class="text-white font-bold text-sm uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-shipping-fast text-primary"></i> Datos de Entrega
            </h3>
            <textarea id="address" placeholder="Dirección completa y referencias..." class="w-full bg-zinc-800 text-white p-4 rounded-xl border border-zinc-700 text-sm focus:border-primary outline-none" rows="2"></textarea>
            <textarea id="general-comment" placeholder="Notas adicionales..." class="w-full bg-zinc-800 text-white p-4 rounded-xl border border-zinc-700 text-sm focus:border-primary outline-none" rows="2"></textarea>
        </div>

        <div class="space-y-4 mb-10 border-t border-zinc-800 pt-8">
            <div id="cart-summary-items" class="text-sm space-y-3 text-zinc-300"></div>
            <div class="border-t border-zinc-700 pt-4 flex justify-between text-2xl font-black mb-6">
                <span class="text-zinc-400 italic">TOTAL:</span>
                <span id="cart-total" class="text-green-500">$0</span>
            </div>
        </div>

        <div class="flex items-start gap-3 mb-10 text-[10px] text-zinc-500 bg-zinc-900 p-5 rounded-xl border border-zinc-800">
            <input type="checkbox" id="terms-check" class="w-6 h-6 rounded border-zinc-700 accent-primary mt-0.5">
            <label id="terms-label" for="terms-check"></label>
        </div>

        <div class="mt-auto pt-6 border-t border-zinc-800">
            <button id="send-btn" onclick="sendOrder()" class="w-full bg-green-600 text-white py-5 rounded-3xl font-black text-xl flex justify-center items-center gap-3 active:scale-95 transition-transform disabled:opacity-30 disabled:pointer-events-none" disabled>
                <i class="fab fa-whatsapp text-3xl"></i> ENVIAR PEDIDO
            </button>
        </div>
    </div>

    <footer class="p-10 border-t border-zinc-900 text-center opacity-40">
        <div id="social-links" class="flex justify-center gap-8 mb-4"></div>
        <p id="footer-brand" class="text-[9px] tracking-widest uppercase font-bold text-zinc-600"></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
