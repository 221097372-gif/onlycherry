<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title"></title>
    <link rel="manifest" href="manifest.json">
    <script src="config.js"></script> 
<style id="dynamic-styles"></style> 
<script>
    // Aplicar Configuración Global al cargar
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Inyectar Colores
        document.getElementById('dynamic-styles').innerHTML = `
            :root {
                --primary: ${CONFIG.colorPrimario};
                --bg: ${CONFIG.colorFondo};
            }
            .text-primary { color: var(--primary) !important; }
            .bg-primary { background-color: var(--primary) !important; }
            .border-primary { border-color: var(--primary) !important; }
        `;
        
        // 2. Inyectar Textos e Identidad
        document.title = `${CONFIG.nombre} | Catálogo`;
        const headerName = document.getElementById('header-name');
        headerName.innerText = CONFIG.nombre.toUpperCase();
        headerName.style.color = CONFIG.colorPrimario; // Color dinámico al logo
    });
</script>
    
</head>
<body class="bg-black text-gray-100 font-sans pb-24">
    <header class="p-4 flex justify-between items-center bg-zinc-900 sticky top-0 z-50 shadow-2xl border-b border-primary">
        <h1 id="header-name" class="text-3xl font-black tracking-tighter italic"></h1>
        <button onclick="toggleCart()" class="relative bg-zinc-800 p-3 rounded-xl border border-zinc-700">
            <i class="fas fa-shopping-cart text-xl text-white"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full hidden">0</span>
        </button>
    </header>

    <nav id="filters" class="p-4 flex gap-2 overflow-x-auto no-scrollbar bg-black sticky top-20 z-40"></nav>

    <main id="catalog" class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="col-span-full text-center py-20 text-zinc-500 flex flex-col items-center gap-4">
            <i class="fas fa-spinner fa-spin text-4xl text-primary"></i>
            <p>Cargando el catálogo premium...</p>
        </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex flex-col p-6 backdrop-blur-sm">
        <div class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
            <h2 class="text-3xl font-extrabold text-white">Tu Pedido</h2>
            <button onclick="toggleCart()" class="text-zinc-500 text-5xl hover:text-red-600">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-5 pr-2 no-scrollbar"></div>
        <div class="border-t border-zinc-800 pt-6 mt-6">
            <div class="flex justify-between text-2xl font-black mb-8">
                <span class="text-zinc-400">TOTAL:</span>
                <span id="cart-total" class="text-green-500">$0</span>
            </div>
            <button onclick="sendOrder()" class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-3xl font-black text-xl shadow-lg flex justify-center items-center gap-3 transition-colors">
                <i class="fab fa-whatsapp text-3xl"></i> ENVIAR PEDIDO POR WHATSAPP
            </button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Registro del Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
<footer id="main-footer" class="p-10 border-t border-zinc-900 text-center opacity-50">
    <div id="social-links" class="flex justify-center gap-6 mb-4"></div>
    <p id="footer-brand" class="text-[10px] tracking-widest uppercase font-bold text-zinc-600"></p>
</footer>

<script>
    // Lógica para pintar las redes sociales si existen
    const container = document.getElementById('social-links');
    if(CONFIG.instagram) container.innerHTML += `<a href="${CONFIG.instagram}" class="text-white text-xl"><i class="fab fa-instagram"></i></a>`;
    if(CONFIG.facebook) container.innerHTML += `<a href="${CONFIG.facebook}" class="text-white text-xl"><i class="fab fa-facebook"></i></a>`;
    if(CONFIG.tiktok) container.innerHTML += `<a href="${CONFIG.tiktok}" class="text-white text-xl"><i class="fab fa-tiktok"></i></a>`;
    
    document.getElementById('footer-brand').innerText = `© 2026 ${CONFIG.nombre} | Powered by Arq. Tech`;
</script>
    
</body>
</html>
