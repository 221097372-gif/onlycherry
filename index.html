<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script> 
    <style id="dynamic-styles"></style> 
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: transform 0.2s; }
        .product-card:active { transform: scale(0.95); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-black text-gray-100 font-sans pb-24">

    <header class="p-4 flex justify-between items-center bg-zinc-900 sticky top-0 z-50 border-b border-primary">
        <h1 id="header-name" class="text-2xl font-black italic"></h1>
        <button onclick="toggleCart()" class="relative bg-zinc-800 p-3 rounded-xl border border-zinc-700">
            <i class="fas fa-shopping-cart text-xl"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-full hidden">0</span>
        </button>
    </header>

    <nav id="filters" class="p-4 flex gap-2 overflow-x-auto no-scrollbar bg-black sticky top-[72px] z-40"></nav>

    <main id="catalog" class="p-4 grid grid-cols-2 gap-4 pb-20"></main>

    <div id="detail-modal" class="fixed inset-0 bg-zinc-950 z-[100] hidden flex flex-col p-6 animate-fade-in">
        <button onclick="closeDetail()" class="absolute top-4 right-6 text-white text-4xl z-[110] bg-black/50 w-12 h-12 rounded-full">×</button>
        
        <div class="flex-1 overflow-y-auto no-scrollbar pb-32">
            <img id="detail-img" src="" class="w-full aspect-square object-cover rounded-3xl mb-6 shadow-2xl">
            <div class="flex justify-between items-center mb-2">
                <span id="detail-cat" class="text-primary font-bold uppercase tracking-widest text-[10px]"></span>
            </div>
            <h2 id="detail-name" class="text-2xl font-black text-white mb-2"></h2>
            <p id="detail-desc" class="text-zinc-400 text-sm mb-6"></p>

            <div class="mb-4">
                <label class="block text-white font-bold text-xs uppercase mb-2">Cantidad</label>
                <div class="flex items-center gap-3 bg-zinc-800 p-3 rounded-xl w-32">
                    <button onclick="changeDetailQty(-1)" class="text-white text-xl w-8">-</button>
                    <input type="number" id="detail-qty" value="1" readonly class="w-full text-center bg-transparent text-white font-black outline-none">
                    <button onclick="changeDetailQty(1)" class="text-white text-xl w-8">+</button>
                </div>
            </div>

            <textarea id="item-comment" placeholder="Talla, Color o Notas..." class="w-full bg-zinc-800 text-white p-4 rounded-xl border border-zinc-700 text-sm outline-none" rows="3"></textarea>
        </div>

        <div class="absolute bottom-6 left-6 right-6 flex justify-between items-center bg-zinc-900 p-5 rounded-3xl border border-zinc-800 shadow-2xl">
            <span id="detail-footer-price" class="text-3xl font-black text-white">$0</span>
            <button onclick="addToCartFromModal()" class="bg-primary text-white px-8 py-4 rounded-2xl font-bold uppercase text-xs">
                Agregar
            </button>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black z-[90] hidden flex flex-col p-6 overflow-y-auto no-scrollbar">
        <div class="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4">
            <h2 class="text-3xl font-black italic">TU PEDIDO</h2>
            <button onclick="toggleCart()" class="text-zinc-500 text-5xl">×</button>
        </div>
        
        <div id="cart-items" class="space-y-4 mb-8"></div>

        <div class="space-y-6 border-t border-zinc-800 pt-8">
            <textarea id="address" placeholder="Dirección y referencias..." class="w-full bg-zinc-800 text-white p-4 rounded-xl text-sm outline-none" rows="2"></textarea>
            <div class="flex justify-between text-zinc-400 text-sm">
                <span>Envío:</span>
                <span id="shipping-display" class="font-bold text-white"></span>
            </div>
            <div class="flex justify-between text-2xl font-black border-t border-zinc-800 pt-4">
                <span>TOTAL:</span>
                <span id="cart-total" class="text-green-500"></span>
            </div>
        </div>

        <div class="flex items-start gap-3 my-8 text-[10px] text-zinc-500 bg-zinc-900 p-4 rounded-xl border border-zinc-800">
            <input type="checkbox" id="terms-check" class="w-5 h-5 rounded accent-primary">
            <label id="terms-label"></label>
        </div>

        <button id="send-btn" onclick="sendOrder()" class="w-full bg-green-600 text-white py-5 rounded-3xl font-black text-xl disabled:opacity-30" disabled>
            ENVIAR WHATSAPP
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
